<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=JetBrains+Mono:wght@400;500;700&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; }
  .cover {
    position: relative; width: 1280px; height: 720px;
    background: #0a0c0b;
    font-family: 'Fraunces', serif; color: #eae3d6;
    overflow: hidden;
  }
  .cover::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(120% 70% at 50% -15%, rgba(79,224,138,.16), transparent 55%),
      repeating-linear-gradient(0deg, transparent 0 47px, rgba(255,255,255,.022) 47px 48px),
      repeating-linear-gradient(90deg, transparent 0 47px, rgba(255,255,255,.022) 47px 48px);
  }
  .cover::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(130% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.6));
  }
  .inner { position: relative; z-index: 2; padding: 84px 88px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
  .kick { font-family: 'JetBrains Mono', monospace; font-size: 18px; letter-spacing: .34em; text-transform: uppercase; color: #4fe08a; display: flex; align-items: center; gap: 14px; margin-bottom: 34px; }
  .kick::before { content: ""; width: 40px; height: 2px; background: #4fe08a; display: inline-block; }
  h1 { font-weight: 900; font-size: 92px; line-height: .97; letter-spacing: -.035em; color: #eae3d6; }
  h1 .grn { color: #4fe08a; }
  .cursor { display:inline-block; width: 30px; height: 8px; background:#4fe08a; vertical-align: baseline; margin-left: 10px; box-shadow: 0 0 16px rgba(79,224,138,.7); }
  .sub { font-family: 'JetBrains Mono', monospace; font-size: 19px; letter-spacing: .04em; color: #9aa39a; margin-top: 40px; }
  .sub b { color: #eae3d6; font-weight: 500; }
  .foot { position: absolute; left: 88px; right: 88px; bottom: 60px; z-index: 2; display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #5d655d; letter-spacing: .08em; }
  .brand { display: inline-flex; align-items: center; gap: 10px; color: #9aa39a; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: #4fe08a; box-shadow: 0 0 12px rgba(79,224,138,.8); }
  .chips { display:flex; gap:10px; }
  .chip { border:1px solid #2f3833; border-radius:4px; padding:5px 11px; color:#9aa39a; }
</style>
</head>
<body>
<div class="cover">
  <div class="inner">
    <div class="kick">50 plug-and-play prompts</div>
    <h1>The Sales&nbsp;&amp;<br>Marketing <span class="grn">AI<br>Prompt Pack</span><span class="cursor"></span></h1>
    <div class="sub">Battle-tested for <b>ChatGPT</b> · <b>Claude</b> · <b>Gemini</b> — research, drafting, analysis, automation.</div>
  </div>
  <div class="foot">
    <span class="brand"><span class="dot"></span>PROFIT ENGINE</span>
    <span class="chips"><span class="chip">RESEARCH</span><span class="chip">DRAFTING</span><span class="chip">ANALYSIS</span><span class="chip">AUTOMATION</span></span>
  </div>
</div>
</body>
</html>
