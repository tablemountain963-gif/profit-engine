name: profit-engine

on:
  schedule:
    # Runs aligned to peak US engagement windows (EDT = UTC-4).
    - cron: '0 13 * * *'   # 9:00am ET — morning peak (social posts here)
    - cron: '0 16 * * *'   # 12:00pm ET — midday
    - cron: '0 21 * * *'   # 5:00pm ET — evening peak (social posts here)
    - cron: '0 1 * * *'    # 9:00pm ET overnight — content/products gen, low social
  workflow_dispatch:
    inputs:
      stream:
        description: 'Run a specific stream only (trends | content | products | viral)'
        required: false
        default: ''
      force:
        description: 'Force run even if not due'
        required: false
        default: 'true'
      skip_generation:
        description: 'Skip content generation — only rebuild site + deploy (for clean redeploys)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: profit-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_ASSOC_TAG: ${{ secrets.AMAZON_ASSOC_TAG }}
          SPONSOR_URL: ${{ secrets.SPONSOR_URL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          set -e
          if [ "${{ inputs.skip_generation }}" = "true" ]; then
            echo "skip_generation=true — rebuilding site only"
            node scripts/build-site.js
          elif [ -n "${{ inputs.stream }}" ]; then
            node src/engine/core.js --only ${{ inputs.stream }} ${{ inputs.force == 'true' && '--force' || '' }}
          else
            node src/engine/core.js --all
          fi

      - name: Commit generated content
        run: |
          git config user.name "profit-engine[bot]"
          git config user.email "engine@profit.local"
          # Stage only source artifacts — public/ is built fresh each run and served via Pages artifact.
          git add data/ output/
          git diff --cached --quiet || git commit -m "engine: autonomous run $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main 2>/dev/null || true
          git push || echo "no changes to push"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
